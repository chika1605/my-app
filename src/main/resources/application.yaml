upload:
  dir: uploads

ml:
  api:
    url: https://2e72-212-42-96-202.ngrok-free.app
    routers:
      save-doc: /ai/save_doc
      get-info: /ai/get_info
      chat: /ai/chat
      asr: /ai/asr

person:
  upload-dir: /upload/files

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/my_app
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB