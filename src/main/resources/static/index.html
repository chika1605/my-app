<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 999px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 1rem;
            color: #444;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Charizard</h1>
        <p>Огнедышащий дракон-покемон типа Огонь/Летающий.<br>Известен своей силой, гордостью и крыльями, способными достичь высоты 1400 метров.</p>
        <div class="badge">
            <span class="dot"></span>Online
        </div>
    </div>
    <footer>© 2026 Charizard. All rights reserved.</footer>
</body>
</html>
