name: Deploy App

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and restart containers
        run: |
          docker compose down
          docker rm -f my_app_postgres my_app 2>/dev/null || true
          docker compose up -d --build